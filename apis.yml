    Get Product Detail contract.
- aid: ubank:ubank-cdr-accounts-balances-api
  name: ubank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ubank.com.au/cdr/apis
  baseURL: https://public.cdr-api.86400.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.ubank.com.au/cdr/apis
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-accounts
    type: APIReference
  - url: openapi/ubank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED Consumer Data Right (CDR) banking endpoints for a
    customer's accounts and balances (Get Accounts, Get Bulk Balances, Get Account
    Balance, Get Account Detail), conforming to the DSB Consumer Data Standards CDR
    Banking API. Unlike the public Product Reference Data surface, these endpoints
    require an active consent and are accessed only by an Accredited Data Recipient
    (ADR) on the customer's behalf via the CDR OAuth2/OIDC (FAPI) authorization model
    over the mutual-TLS data-holder host; they are not open/unauthenticated.
