apis:
- aid: ubank:ubank-cdr-product-reference-data-api
  name: ubank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Products
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ubank.com.au/cdr/apis
  baseURL: https://public.cdr-api.86400.com.au/cds-au/v1
  properties:
  - url: https://www.ubank.com.au/cdr/apis
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: openapi/ubank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data endpoint (GET /banking/products) returning ubank's openly available banking
    products - savings accounts and residential mortgages - with pricing, fees, and
    eligibility, conforming to the DSB Consumer Data Standards. Confirmed live returning
    HTTP 200 with an x-v response header on version 5.
- aid: ubank:ubank-cdr-product-detail-api
  name: ubank CDR Banking Product Detail API
  tags:
  - CDR
  - Open Banking
  - Product Detail
  - Banking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ubank.com.au/cdr/apis
  baseURL: https://public.cdr-api.86400.com.au/cds-au/v1
  properties:
  - url: https://www.ubank.com.au/cdr/apis
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-product-detail
    type: APIReference
  - url: openapi/ubank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated CDR endpoint (GET /banking/products/{productId})
    returning the full detail for a single ubank banking product - rates, fees, features,
    eligibility, constraints, and terms - conforming to the DSB Consumer Data Standards
    Get Product Detail contract.
