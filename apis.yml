name: ubank
kind: company
description: ubank is an Australian digital-only bank offering savings accounts and
  home loans online and over the phone. Launched in 2008 as the online banking brand
  of National Australia Bank (NAB), ubank operates under NAB's authorised deposit-taking
  institution (ADI) licence and is registered in the Consumer Data Right (CDR) ecosystem
  as the "UBank" data holder brand under NAB (ABN 12 004 044 937). After NAB acquired
  neobank 86 400 in 2021, its customers and technology were migrated onto the 86 400
  platform, which is why ubank's public CDR API surface is hosted at public.cdr-api.86400.com.au.
  As a CDR data holder, ubank exposes a public, unauthenticated Product Reference Data
  (PRD) API conforming to the Consumer Data Standards, while authenticated consumer
  banking data is shared only with accredited data recipients under the CDR's OAuth2/OIDC
  (FAPI) authorization model.
