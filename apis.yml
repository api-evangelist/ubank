    Detail), conforming to the DSB Consumer Data Standards CDR Banking API. These
    endpoints require an active CDR consent and are called by an Accredited Data
    Recipient (ADR) under the CDR OAuth2/OIDC (FAPI) authorization model over the
    mutual-TLS data-holder host - they are not publicly accessible without
    authorization.
