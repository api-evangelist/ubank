  detail: >-
    Public, unauthenticated CDR Product Reference Data. No API key, token, or
    client credential is required. Requests must carry an x-v version header.
- name: authenticated-cdr-data-sharing
  auth: oauth2 + openid-connect
  security_profile: FAPI (Financial-grade API)
  applies_to: not-publicly-accessible
  detail: >-
    Consumer banking data (accounts, balances, transactions, payees, scheduled
    payments, direct debits) is shared only with CDR Accredited Data Recipients
